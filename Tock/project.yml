name: Tock
options:
  bundleIdPrefix: com.cypressvideoco
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_NAME: Tock
    PRODUCT_BUNDLE_IDENTIFIER: com.cypressvideoco.tock
    # Sign to Run Locally — no paid Apple Developer account required.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    # Synthesize Info.plist from build settings (no plist file to maintain).
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_CFBundleDisplayName: Tock
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"

targets:
  Tock:
    type: application
    platform: macOS
    sources:
      - path: Sources
